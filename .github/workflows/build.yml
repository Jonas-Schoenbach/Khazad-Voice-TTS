name: Build & Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build Installer
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: pip install pyinstaller Pillow

      - name: Build installer exe
        run: python installer/build_installer.py --clean

      - name: Upload exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: Khazad-Voice-Setup
          path: installer/dist/Khazad-Voice-Setup.exe
          retention-days: 7

  release:
    name: Publish Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download exe artifact
        uses: actions/download-artifact@v4
        with:
          name: Khazad-Voice-Setup
          path: ./dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: ./dist/Khazad-Voice-Setup.exe
